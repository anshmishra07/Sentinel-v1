services:
  - type: web
    name: sentinel-monitor-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DEFAULT_CPU_THRESHOLD
        value: "80"
      - key: DEFAULT_MEMORY_THRESHOLD
        value: "85"
      - key: DEFAULT_DISK_THRESHOLD
        value: "90"
      - key: DEVICE_OFFLINE_AFTER_MS
        value: "15000"
      - key: ALERT_EMAIL_TO
        sync: false
      - key: ALERT_EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
